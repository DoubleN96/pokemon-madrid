<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#14161c" />
  <title>Pokémon Madrid — Edición Castiza</title>

  <!--
    FUENTE PÍXEL DEL JUEGO — la AUTÉNTICA de Pokémon Rojo Fuego/Verde Hoja (GBA).
    "Pokémon FRLG" es una recreación libre de la tipografía original de la GBA,
    DISEÑADA para leerse a tamaño pequeño en la pantalla de la consola: trazos
    GRUESOS de 2px y caja monoespaciada, así que sale nítida y muy legible en
    móvil (al contrario que las pixel-fonts finas tipo Pixelify, que se veían
    como hilitos grises). Cubre todo el ASCII + acentos castellanos
    (Á É Í Ó Ú Ñ Ü á é í ó ú ñ ü ¡ ¿). Subset woff2 (~3.5 KB).
    Se expone bajo el alias 'PixelMadrid' para que src/ui/theme.js la use sin
    cambiar el nombre de familia. El fallback a 'monospace' cubre los pocos
    glifos que la fuente no trae (cursores ▶ ▼ ↑ ↓, ₧ pesetas, € y ★).
  -->
  <link rel="preload" href="./assets/fonts/PokemonFRLG.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face {
      font-family: 'PixelMadrid';
      src: url('./assets/fonts/PokemonFRLG.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }
    /* Anti-aliasing nítido para el texto píxel del juego (canvas Phaser). */
    #game canvas { image-rendering: pixelated; }
  </style>

  <!--
    La carcasa Game Boy Advance SP (CSS puro) se construye en src/ui/gbaShell.js.
    gbaShell.js crea el <div id="game"> dentro del bisel ANTES de que Phaser
    arranque (src/main.js usa parent:'game'). Por eso este módulo se importa
    primero y monta la carcasa de forma síncrona.
  -->
  <script type="module">
    import { mountGbaShell } from '/src/ui/gbaShell.js';
    mountGbaShell();
  </script>
</head>
<body>
  <!-- #game lo inserta gbaShell.js dentro de la pantalla de la consola. -->
  <!--
    Phaser dibuja el texto en <canvas>, así que la fuente píxel DEBE estar
    rasterizada ANTES de que main.js cree el juego (de lo contrario el primer
    render usaría el fallback monospace borroso y se cachearía). Por eso aquí
    forzamos la carga de 'PixelMadrid' con document.fonts.load(), esperamos a
    document.fonts.ready y SOLO entonces importamos dinámicamente main.js.
    Con esto NO hace falta tocar main.js.
  -->
  <script type="module">
    async function boot() {
      try {
        if (document.fonts && document.fonts.load) {
          // Cargar los tamaños que usa el juego (texto base 10px + títulos)
          // para forzar el rasterizado antes del primer render; ready garantiza
          // que TODAS las instancias estén listas.
          await Promise.all([
            document.fonts.load('10px "PixelMadrid"'),
            document.fonts.load('8px "PixelMadrid"'),
            document.fonts.load('16px "PixelMadrid"'),
            document.fonts.load('30px "PixelMadrid"'),
          ]);
          await document.fonts.ready;
        }
      } catch (e) {
        // Si la API de fuentes falla, arrancamos igualmente (fallback monospace).
        console.warn('[fuente] no se pudo precargar PixelMadrid:', e);
      }
      await import('/src/main.js');
    }
    boot();
  </script>
</body>
</html>
